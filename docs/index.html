<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIREEL - Cabina</title>

<link rel="icon" href="img/logotab.ico" type="image/x-icon">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<img src="img/logo.png" id="logo">

<div id="hudTop">
  <div id="nivel">Nivel 1</div>
  <div id="timer">45</div>
</div>

<div id="cabina">
  <div id="road"></div>

  <div id="questionBox">
    <h2 id="question">Presiona iniciar</h2>
  </div>

  <div id="wheel">🛞</div>

  <div id="answers">
    <button onclick="responder(0)">A</button>
    <button onclick="responder(1)">B</button>
    <button onclick="responder(2)">C</button>
  </div>

  <div id="progressBar">
    <div id="progress"></div>
  </div>
</div>

<button id="start">Iniciar</button>

<script src="script.js"></script>
</body>
</html>
