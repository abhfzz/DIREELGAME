<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIREEL - Simulador</title>

<!-- FAVICON -->
<link rel="shortcut icon" href="./img/logotab.ico" type="image/x-icon">
<link rel="icon" href="./img/logotab.ico" type="image/x-icon">

<!-- CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- LOGO -->
<img src="./img/logo.png" id="logo" alt="DIREEL Logo">

<!-- HUD -->
<div id="hudTop">

  <div id="nivel">
    Nivel 1
  </div>

  <div id="timer">
    15
  </div>

</div>

<!-- CABINA -->
<div id="cabina">

  <!-- PREGUNTA -->
  <div id="questionBox">

    <h2 id="question">
      Presiona iniciar
    </h2>

  </div>

  <!-- VOLANTE -->
  <div id="wheel">
    🛞
  </div>

  <!-- RESPUESTAS -->
  <div id="answers">

    <button type="button" onclick="responder(0)">
      A
    </button>

    <button type="button" onclick="responder(1)">
      B
    </button>

    <button type="button" onclick="responder(2)">
      C
    </button>

  </div>

</div>

<!-- BARRA -->
<div id="progressBar">

  <div id="progress"></div>

</div>

<!-- BOTÓN -->
<button id="start" type="button">
  Iniciar
</button>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
