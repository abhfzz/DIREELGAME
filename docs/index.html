<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIREEL - Cabina de Diagnóstico</title>

<link rel="icon" href="img/logotab.ico" type="image/x-icon">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Logo -->
<img src="img/logo.png" id="logo">

<h1>DIREEL - Cabina de Diagnóstico</h1>

<button id="start">Iniciar</button>

<div id="game">

  <!-- CABINA -->
  <div id="cabina">

    <!-- PARABRISAS / HUD -->
    <div id="hud">

      <div id="status">
        <div>Aciertos: <span id="score">0</span></div>
        <div>Nivel: <span id="level">Operador</span></div>
        <div>Tiempo: <span id="time">10</span></div>
      </div>

      <div id="questionBox">
        <h2 id="question">Preparando...</h2>
        <div id="answers"></div>
      </div>

      <div id="feedback"></div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
